<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration — Album Poche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0e1b2a; --navy-light: #1a2d42; --navy-mid: #152333;
      --gold: #c9a96e; --cream: #f7f4ef; --text-muted: #8a9bb0;
      --success: #6ec9a9; --danger: #e07070;
    }
    body { background: var(--navy); color: var(--cream); font-family: 'Montserrat', sans-serif; font-weight: 300; min-height: 100vh; }
    header { background: var(--navy-light); border-bottom: 1px solid rgba(201,169,110,0.15); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .header-initials { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; color: var(--gold); letter-spacing: 0.1em; }
    .header-name { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-muted); margin-left: 0.75rem; }
    .header-badge { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(201,169,110,0.3); border-radius: 2px; padding: 0.3rem 0.7rem; }
    #adminLogin { max-width: 380px; margin: 6rem auto; text-align: center; padding: 2rem; }
    #adminApp { display: none; max-width: 1100px; margin: 0 auto; padding: 2rem; gap: 2rem; }
    #adminApp.visible { display: grid; grid-template-columns: 400px 1fr; align-items: start; }
    @media (max-width: 900px) { #adminApp.visible { grid-template-columns: 1fr; } }
    .panel { background: var(--navy-light); border: 1px solid rgba(201,169,110,0.12); border-radius: 2px; overflow: hidden; }
    .panel-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid rgba(201,169,110,0.1); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-muted); }
    .panel-body { padding: 1.5rem; }
    .field { margin-bottom: 1.25rem; }
    .field label { display: block; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
    .field input { width: 100%; background: var(--navy); border: 1px solid rgba(201,169,110,0.15); border-radius: 2px; color: var(--cream); font-family: 'Montserrat', sans-serif; font-size: 0.82rem; font-weight: 300; padding: 0.7rem 0.9rem; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--gold); }
    .upload-zone { border: 2px dashed rgba(201,169,110,0.2); border-radius: 2px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--gold); background: rgba(201,169,110,0.04); }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 2rem; opacity: 0.3; margin-bottom: 0.75rem; }
    .upload-text { font-size: 0.7rem; letter-spacing: 0.1em; color: var(--text-muted); }
    .upload-hint { font-size: 0.6rem; color: rgba(138,155,176,0.5); margin-top: 0.4rem; }
    .file-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
    .file-thumb { width: 60px; height: 60px; object-fit: cover; border: 1px solid rgba(201,169,110,0.15); border-radius: 2px; }
    .file-count { font-size: 0.65rem; color: var(--gold); margin-top: 0.75rem; letter-spacing: 0.1em; }
    .progress-bar { height: 2px; background: rgba(201,169,110,0.15); border-radius: 1px; margin-top: 1rem; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
    .btn { display: inline-block; padding: 0.8rem 1.5rem; font-family: 'Montserrat', sans-serif; font-size: 0.62rem; font-weight: 400; letter-spacing: 0.25em; text-transform: uppercase; border-radius: 2px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
    .btn-primary { background: var(--gold); border-color: var(--gold); color: var(--navy); width: 100%; }
    .btn-primary:hover { background: #e2c99a; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-ghost { background: transparent; border-color: rgba(201,169,110,0.25); color: var(--text-muted); font-size: 0.58rem; }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger { background: transparent; border-color: rgba(224,112,112,0.3); color: var(--danger); font-size: 0.58rem; padding: 0.35rem 0.7rem; }
    .btn-danger:hover { background: rgba(224,112,112,0.1); }
    .msg { font-size: 0.7rem; letter-spacing: 0.05em; margin-top: 1rem; min-height: 1.2em; padding: 0.5rem 0; }
    .msg.success { color: var(--success); } .msg.error { color: var(--danger); } .msg.info { color: var(--text-muted); }
    .link-box { background: var(--navy); border: 1px solid rgba(201,169,110,0.2); border-radius: 2px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem; }
    .link-box code { flex: 1; font-size: 0.7rem; color: var(--gold); word-break: break-all; letter-spacing: 0.05em; }
    .btn-copy { background: transparent; border: 1px solid rgba(201,169,110,0.25); border-radius: 2px; color: var(--text-muted); font-size: 0.6rem; padding: 0.35rem 0.6rem; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .btn-copy:hover { border-color: var(--gold); color: var(--gold); }
    .clients-list { display: flex; flex-direction: column; gap: 2px; }
    .client-row { display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 0.75rem; padding: 0.85rem 1.25rem; background: var(--navy); border: 1px solid rgba(201,169,110,0.08); border-radius: 2px; transition: border-color 0.2s; }
    .client-row:hover { border-color: rgba(201,169,110,0.2); }
    .client-row.inactive { opacity: 0.4; }
    .client-nom { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; }
    .client-session { font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.05em; margin-top: 0.15rem; }
    .client-photos { font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.1em; white-space: nowrap; }
    .badge-actif { font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 2px; }
    .badge-actif.on { color: var(--success); border: 1px solid rgba(110,201,169,0.3); }
    .badge-actif.off { color: var(--danger); border: 1px solid rgba(224,112,112,0.3); }
    .empty-list { text-align: center; padding: 2.5rem; color: var(--text-muted); font-size: 0.7rem; letter-spacing: 0.12em; }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:baseline;">
    <span class="header-initials">DB</span>
    <span class="header-name">David Boyer · Photographe</span>
  </div>
  <span class="header-badge">Administration</span>
</header>

<div id="adminLogin">
  <p style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;margin-bottom:2rem;">Accès administrateur</p>
  <div class="field">
    <label>Mot de passe admin</label>
    <input type="password" id="adminPwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()">
  </div>
  <button class="btn btn-primary" onclick="adminLogin()">Connexion</button>
  <p class="msg" id="loginMsg"></p>
</div>

<div id="adminApp">
  <div>
    <div class="panel" style="margin-bottom:1.5rem;">
      <div class="panel-header"><span class="panel-title">Nouveau client</span></div>
      <div class="panel-body">
        <div class="field">
          <label>Nom du client</label>
          <input type="text" id="clientNom" placeholder="ex : Famille Dupont">
        </div>
        <div class="field">
          <label>Intitulé de la séance</label>
          <input type="text" id="clientSession" placeholder="ex : Séance Portrait · Mars 2025">
        </div>
        <div class="field">
          <label>Photos (JPEG, PNG — max 50)</label>
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple onchange="previewFiles(this.files)">
            <div class="upload-icon">◻</div>
            <p class="upload-text">Glissez vos photos ici ou cliquez</p>
            <p class="upload-hint">JPEG · PNG · WebP</p>
          </div>
          <div class="file-preview" id="filePreview"></div>
          <p class="file-count" id="fileCount"></p>
        </div>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <button class="btn btn-primary" id="createBtn" onclick="createClient()" style="margin-top:1rem;">Créer le client &amp; uploader</button>
        <p class="msg" id="createMsg"></p>
        <div id="linkResult" style="display:none;">
          <p style="font-size:0.65rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;">Lien à envoyer au client :</p>
          <div class="link-box">
            <code id="linkCode"></code>
            <button class="btn-copy" onclick="copyLink()">Copier</button>
          </div>
          <p style="font-size:0.6rem;color:var(--text-muted);margin-top:0.5rem;letter-spacing:0.05em;">
            Code seul : <strong id="tokenDisplay" style="color:var(--gold);font-size:0.65rem;letter-spacing:0.15em;"></strong>
          </p>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Clients</span>
        <button class="btn btn-ghost" onclick="loadClients()">↻ Actualiser</button>
      </div>
      <div class="panel-body">
        <div class="clients-list" id="clientsList"><p class="empty-list">Chargement…</p></div>
      </div>
    </div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDocs, collection, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ADMIN_PASSWORD = "db2025admin"; // ← CHANGE CE MOT DE PASSE
  let selectedFiles = [];
  let generatedLink = '';

  window.adminLogin = function() {
    const pwd = document.getElementById('adminPwd').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('adminLogin').style.display = 'none';
      document.getElementById('adminApp').classList.add('visible');
      loadClients();
    } else {
      const m = document.getElementById('loginMsg');
      m.className = 'msg error';
      m.textContent = 'Mot de passe incorrect.';
    }
  };

  window.previewFiles = function(files) {
    selectedFiles = Array.from(files).slice(0, 50);
    const preview = document.getElementById('filePreview');
    const count = document.getElementById('fileCount');
    preview.innerHTML = '';
    selectedFiles.forEach(f => {
      const img = document.createElement('img');
      img.className = 'file-thumb';
      img.src = URL.createObjectURL(f);
      preview.appendChild(img);
    });
    count.textContent = selectedFiles.length
      ? selectedFiles.length + ' photo' + (selectedFiles.length > 1 ? 's' : '') + ' sélectionnée' + (selectedFiles.length > 1 ? 's' : '')
      : '';
  };

  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); window.previewFiles(e.dataTransfer.files); });

  function generateToken() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    const part = n => Array.from({length: n}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    return `${part(4)}-${part(4)}-${part(4)}`;
  }

  async function uploadToCloudinary(file, token, index) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', cloudinaryConfig.uploadPreset);
    formData.append('folder', `album-poche/${token}`);
    formData.append('public_id', `photo_${String(index).padStart(3,'0')}`);

    const res = await fetch(
      `https://api.cloudinary.com/v1_1/${cloudinaryConfig.cloudName}/image/upload`,
      { method: 'POST', body: formData }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.secure_url;
  }

  window.createClient = async function() {
    const nom = document.getElementById('clientNom').value.trim();
    const session = document.getElementById('clientSession').value.trim();
    const msg = document.getElementById('createMsg');
    const btn = document.getElementById('createBtn');

    if (!nom) { msg.className='msg error'; msg.textContent='Nom du client requis.'; return; }
    if (selectedFiles.length === 0) { msg.className='msg error'; msg.textContent='Ajoutez au moins une photo.'; return; }

    btn.disabled = true;
    document.getElementById('linkResult').style.display = 'none';
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    progressBar.style.display = 'block';
    progressFill.style.width = '0%';
    msg.className = 'msg info';
    msg.textContent = 'Upload des photos en cours…';

    const token = generateToken();
    const photoUrls = [];

    try {
      for (let i = 0; i < selectedFiles.length; i++) {
        msg.textContent = `Upload ${i+1}/${selectedFiles.length}…`;
        const url = await uploadToCloudinary(selectedFiles[i], token, i);
        photoUrls.push(url);
        progressFill.style.width = Math.round(((i+1)/selectedFiles.length)*100) + '%';
      }

      await setDoc(doc(db, 'clients', token), {
        nom, session,
        photos: photoUrls,
        actif: true,
        createdAt: new Date().toISOString()
      });

      msg.className = 'msg success';
      msg.textContent = 'Client créé avec succès !';

      const baseUrl = window.location.origin + window.location.pathname.replace('admin.html','');
      generatedLink = `${baseUrl}index.html?token=${token}`;
      document.getElementById('linkCode').textContent = generatedLink;
      document.getElementById('tokenDisplay').textContent = token;
      document.getElementById('linkResult').style.display = 'block';

      document.getElementById('clientNom').value = '';
      document.getElementById('clientSession').value = '';
      document.getElementById('filePreview').innerHTML = '';
      document.getElementById('fileCount').textContent = '';
      document.getElementById('fileInput').value = '';
      selectedFiles = [];
      loadClients();

    } catch(e) {
      console.error(e);
      msg.className = 'msg error';
      msg.textContent = 'Erreur : ' + e.message;
    }
    btn.disabled = false;
  };

  window.copyLink = function() {
    navigator.clipboard.writeText(generatedLink).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = '✓ Copié';
      setTimeout(() => btn.textContent = 'Copier', 2000);
    });
  };

  window.loadClients = async function() {
    const list = document.getElementById('clientsList');
    list.innerHTML = '<p class="empty-list">Chargement…</p>';
    try {
      const snap = await getDocs(collection(db, 'clients'));
      if (snap.empty) { list.innerHTML = '<p class="empty-list">Aucun client pour l\'instant</p>'; return; }
      const clients = [];
      snap.forEach(d => clients.push({ id: d.id, ...d.data() }));
      clients.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
      list.innerHTML = '';
      clients.forEach(c => {
        const row = document.createElement('div');
        row.className = 'client-row' + (c.actif === false ? ' inactive' : '');
        row.innerHTML = `
          <div>
            <div class="client-nom">${c.nom}</div>
            <div class="client-session">${c.session||''}</div>
          </div>
          <div class="client-photos">${(c.photos||[]).length} photo${(c.photos||[]).length>1?'s':''}</div>
          <span class="badge-actif ${c.actif!==false?'on':'off'}">${c.actif!==false?'Actif':'Inactif'}</span>
          <div style="display:flex;gap:0.4rem;">
            <button class="btn btn-ghost" onclick="copyClientLink('${c.id}')" title="Copier le lien">🔗</button>
            <button class="btn btn-danger" onclick="toggleClient('${c.id}',${c.actif!==false})">${c.actif!==false?'Désactiver':'Réactiver'}</button>
          </div>`;
        list.appendChild(row);
      });
    } catch(e) {
      list.innerHTML = `<p class="empty-list" style="color:var(--danger)">Erreur : ${e.message}</p>`;
    }
  };

  window.copyClientLink = function(token) {
    const baseUrl = window.location.origin + window.location.pathname.replace('admin.html','');
    navigator.clipboard.writeText(`${baseUrl}index.html?token=${token}`);
  };

  window.toggleClient = async function(token, currentlyActive) {
    await updateDoc(doc(db, 'clients', token), { actif: !currentlyActive });
    loadClients();
  };

  document.getElementById('adminPwd').addEventListener('keydown', e => { if(e.key==='Enter') window.adminLogin(); });
</script>
</body>
</html>
