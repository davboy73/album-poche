<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Galerie — David Boyer Photographe</title>
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0e1b2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Album Poche">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0e1b2a; --navy-light: #1a2d42; --navy-mid: #152333;
      --gold: #c9a96e; --cream: #f7f4ef; --text-muted: #8a9bb0;
    }
    body { background: var(--navy); color: var(--cream); font-family: 'Montserrat', sans-serif; font-weight: 300; min-height: 100vh; user-select: none; -webkit-user-select: none; }
    header { position: sticky; top: 0; z-index: 100; background: var(--navy); border-bottom: 1px solid rgba(201,169,110,0.12); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .header-initials { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; color: var(--gold); letter-spacing: 0.1em; }
    .header-name { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-muted); margin-left: 0.75rem; }
    .header-client-name { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-style: italic; color: var(--cream); text-align: right; }
    .header-client-count { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-top: 0.2rem; text-align: right; }
    .btn-logout { background: transparent; border: 1px solid rgba(201,169,110,0.25); border-radius: 2px; color: var(--text-muted); font-family: 'Montserrat', sans-serif; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; padding: 0.4rem 0.8rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-logout:hover { border-color: var(--gold); color: var(--gold); }
    .gallery-header { padding: 2.5rem 2rem 1.5rem; text-align: center; }
    .gallery-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; font-style: italic; color: var(--cream); }
    .gallery-subtitle { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-top: 0.5rem; }
    .divider { width: 30px; height: 1px; background: var(--gold); margin: 1.5rem auto; opacity: 0.4; }
    .grid { columns: 3; column-gap: 4px; padding: 0 2rem 3rem; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 900px) { .grid { columns: 2; } }
    @media (max-width: 500px) { .grid { columns: 1; padding: 0 0.5rem 2rem; } }
    .grid-item { position: relative; break-inside: avoid; margin-bottom: 4px; cursor: pointer; background: #000; overflow: hidden; }
    .grid-item img { width: 100%; height: auto; display: block; transition: transform 0.4s ease, opacity 0.3s; pointer-events: none; opacity: 0.92; }
    .grid-item:hover img { transform: scale(1.02); opacity: 1; }
    .grid-item-overlay { position: absolute; inset: 0; background: rgba(14,27,42,0); transition: background 0.3s; }
    .grid-item:hover .grid-item-overlay { background: rgba(14,27,42,0.1); }
    .skeleton { background: linear-gradient(90deg, var(--navy-light) 25%, var(--navy-mid) 50%, var(--navy-light) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; height: 200px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .lightbox { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(14,27,42,0.97); align-items: center; justify-content: center; flex-direction: column; }
    .lightbox.open { display: flex; }
    .lightbox-img-container { position: relative; max-width: 90vw; max-height: 82vh; overflow: hidden; }
    .lightbox img { max-width: 90vw; max-height: 82vh; object-fit: contain; display: block; pointer-events: none; border: 1px solid rgba(201,169,110,0.1); transition: transform 0.35s ease, opacity 0.35s ease; }
    .lightbox img.slide-left { transform: translateX(-60px); opacity: 0; }
    .lightbox img.slide-right { transform: translateX(60px); opacity: 0; }
    .lightbox-close { position: absolute; top: 1.25rem; right: 1.5rem; background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; }
    .lightbox-close:hover { color: var(--cream); }
    .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(14,27,42,0.7); border: 1px solid rgba(201,169,110,0.2); border-radius: 2px; color: var(--gold); font-size: 1.2rem; padding: 0.6rem 0.9rem; cursor: pointer; transition: all 0.2s; z-index: 10; }
    .lightbox-nav:hover { background: rgba(201,169,110,0.15); }
    .lightbox-prev { left: 1.5rem; } .lightbox-next { right: 1.5rem; }
    .lightbox-counter { margin-top: 1.25rem; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
    .state-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 1rem; color: var(--text-muted); }
    .state-text { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; }
  </style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;">
    <img src="logo.png" alt="David Boyer Photographe" style="height:36px;width:auto;filter:brightness(0) invert(1);opacity:0.85;">
  </div>
  <div>
    <div class="header-client-name" id="clientName">—</div>
    <div class="header-client-count" id="clientCount"></div>
  </div>
  <button class="btn-logout" onclick="logout()">Quitter</button>
</header>

<div class="gallery-header">
  <h1 class="gallery-title">Votre galerie</h1>
  <p class="gallery-subtitle" id="sessionLabel">Chargement…</p>
  <div class="divider"></div>
</div>

<div class="grid" id="grid"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightboxBtn()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1,event)">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1,event)">›</button>
  <div class="lightbox-counter" id="lbCounter"></div>
</div>

<script src="firebase-config.js"></script>
<script>
  // ── FIRESTORE REST API ──
  const PROJECT_ID = firebaseConfig.projectId;
  const API_KEY = firebaseConfig.apiKey;
  const BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents`;

  async function fsGet(collection, id) {
    const r = await fetch(`${BASE}/${collection}/${id}?key=${API_KEY}`);
    if (!r.ok) throw new Error('Document introuvable');
    return fsParseDoc(await r.json());
  }

  function fsParseDoc(doc) {
    const fields = doc.fields || {};
    const result = {};
    for (const [k, v] of Object.entries(fields)) {
      if (v.stringValue !== undefined) result[k] = v.stringValue;
      else if (v.booleanValue !== undefined) result[k] = v.booleanValue;
      else if (v.arrayValue !== undefined) result[k] = (v.arrayValue.values || []).map(i => i.stringValue || '');
    }
    return result;
  }

  // Auth check
  function getCookie(name) {
    const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return v ? v.pop() : null;
  }

  const token = sessionStorage.getItem('albumToken') || getCookie('albumToken');
  if (!token) { window.location.href = 'index.html'; }

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && ['s','u','p'].includes(e.key.toLowerCase())) e.preventDefault(); });
  document.addEventListener('dragstart', e => e.preventDefault());

  let photos = [];
  let currentIndex = 0;

  async function loadGallery() {
    const grid = document.getElementById('grid');
    for (let i = 0; i < 6; i++) {
      const sk = document.createElement('div');
      sk.className = 'grid-item skeleton';
      grid.appendChild(sk);
    }
    try {
      const data = await fsGet('clients', token);

      document.getElementById('clientName').textContent = data.nom || '—';
      document.getElementById('sessionLabel').textContent = data.session || '';
      const photoUrls = data.photos || [];
      document.getElementById('clientCount').textContent = photoUrls.length + (photoUrls.length > 1 ? ' photos' : ' photo');

      grid.innerHTML = '';
      if (photoUrls.length === 0) {
        grid.innerHTML = `<div class="state-center"><p class="state-text">Votre galerie sera disponible prochainement</p></div>`;
        return;
      }

      photos = photoUrls;

      photoUrls.forEach((url, i) => {
        const thumbUrl = url.replace('/upload/', '/upload/w_600,q_auto,f_auto/');
        const item = document.createElement('div');
        item.className = 'grid-item';
        item.innerHTML = `<img src="${thumbUrl}" alt="Photo ${i+1}" loading="lazy"><div class="grid-item-overlay"></div>`;
        item.addEventListener('click', () => openLightbox(i));
        grid.appendChild(item);
      });

    } catch(e) {
      console.error(e);
      grid.innerHTML = `<div class="state-center"><p class="state-text">Erreur de chargement — réessayez</p></div>`;
    }
  }

  function openLightbox(i) {
    currentIndex = i;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  let isAnimating = false;

  function updateLightbox(dir = 0) {
    if (isAnimating) return;
    isAnimating = true;
    const img = document.getElementById('lbImg');
    const outClass = dir >= 0 ? 'slide-left' : 'slide-right';
    const inClass = dir >= 0 ? 'slide-right' : 'slide-left';
    img.classList.add(outClass);
    setTimeout(() => {
      img.src = photos[currentIndex];
      img.classList.remove(outClass);
      img.classList.add(inClass);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          img.classList.remove(inClass);
          isAnimating = false;
        });
      });
    }, 300);
    document.getElementById('lbCounter').textContent = `${currentIndex+1} / ${photos.length}`;
  }

  // ── COMPTEUR DE VUES ──
  async function recordView(token) {
    try {
      // Lire d'abord le nombre de vues actuel
      const r = await fetch(`${BASE}/clients/${token}?key=${API_KEY}`);
      const doc = await r.json();
      const currentVues = doc.fields?.vues?.integerValue ? parseInt(doc.fields.vues.integerValue) : 0;
      const derniereVisite = new Date().toISOString();
      await fetch(`${BASE}/clients/${token}?key=${API_KEY}&updateMask.fieldPaths=vues&updateMask.fieldPaths=derniereVisite`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fields: {
          vues: { integerValue: String(currentVues + 1) },
          derniereVisite: { stringValue: derniereVisite }
        }})
      });
    } catch(e) { console.log('Vue non enregistrée', e); }
  }

  window.closeLightbox = function(e) { if (e.target === document.getElementById('lightbox')) closeLightboxBtn(); };
  window.closeLightboxBtn = function() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; };
  window.navLightbox = function(dir, e) { e.stopPropagation(); currentIndex = (currentIndex+dir+photos.length)%photos.length; updateLightbox(dir); };

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key==='ArrowRight') { currentIndex = (currentIndex+1)%photos.length; updateLightbox(1); }
    if (e.key==='ArrowLeft') { currentIndex = (currentIndex-1+photos.length)%photos.length; updateLightbox(-1); }
    if (e.key==='Escape') closeLightboxBtn();
  });

  window.logout = function() { 
    sessionStorage.clear(); 
    document.cookie = 'albumToken=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/';
    window.location.href = 'index.html'; 
  };

  loadGallery();
  recordView(token);

  // Enregistrement PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>

</body>
